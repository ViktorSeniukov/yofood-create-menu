<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #202124;
      padding: 16px;
      background: #fff;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a73e8;
    }

    .section {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #3c4043;
    }

    input[type="password"],
    input[type="file"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #1a73e8;
    }

    input[type="file"] {
      padding: 6px;
      cursor: pointer;
    }

    .key-row {
      display: flex;
      gap: 8px;
    }

    .key-row input {
      flex: 1;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary {
      background: #f1f3f4;
      color: #3c4043;
    }

    .btn-secondary:hover { background: #e8eaed; }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border-radius: 4px;
    }

    .btn-primary:hover:not(:disabled) { background: #1557b0; }

    .btn-primary:disabled {
      background: #dadce0;
      color: #9aa0a6;
      cursor: not-allowed;
    }

    .key-status {
      font-size: 11px;
      margin-top: 5px;
      color: #5f6368;
    }

    .key-status.saved { color: #188038; }

    .status-box {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .status-box.error { background: #fce8e6; color: #c5221f; display: block; }
    .status-box.success { background: #e6f4ea; color: #188038; display: block; }
    .status-box.loading { background: #e8f0fe; color: #1a73e8; display: block; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #1a73e8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h2>Генератор меню</h2>

<div class="section">
  <label>Claude API ключ</label>
  <div class="key-row">
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn-secondary" onclick="onSaveKey()">Сохранить</button>
  </div>
  <div class="key-status" id="keyStatus"></div>
</div>

<div class="section">
  <label>Файл меню (.txt или .docx)</label>
  <input type="file" id="menuFile" accept=".txt,.docx" onchange="onFileSelected()">
</div>

<button class="btn-primary" id="runBtn" disabled onclick="onRun()">
  Перевести и вставить в таблицу
</button>

<div class="status-box" id="statusBox"></div>

<script>
  var fileBase64 = null
  var fileMime = null

  // On load: check if key is already saved
  google.script.run
    .withSuccessHandler(function(hasSaved) {
      if (hasSaved) {
        document.getElementById('keyStatus').textContent = 'Ключ сохранён'
        document.getElementById('keyStatus').className = 'key-status saved'
      }
    })
    .hasApiKey()

  function onSaveKey() {
    var key = document.getElementById('apiKey').value.trim()
    if (!key) return
    google.script.run
      .withSuccessHandler(function() {
        document.getElementById('apiKey').value = ''
        document.getElementById('keyStatus').textContent = 'Ключ сохранён'
        document.getElementById('keyStatus').className = 'key-status saved'
      })
      .withFailureHandler(showError)
      .saveApiKey(key)
  }

  function onFileSelected() {
    var file = document.getElementById('menuFile').files[0]
    if (!file) { fileBase64 = null; fileMime = null; updateRunBtn(); return }

    fileMime = file.type || (file.name.endsWith('.docx')
      ? 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
      : 'text/plain')

    var reader = new FileReader()
    reader.onload = function(e) {
      fileBase64 = e.target.result
      updateRunBtn()
    }
    reader.readAsDataURL(file)
  }

  function updateRunBtn() {
    document.getElementById('runBtn').disabled = !fileBase64
  }

  function onRun() {
    setStatus('loading', '<span class="spinner"></span>Отправляем меню в Claude...')
    document.getElementById('runBtn').disabled = true

    google.script.run
      .withSuccessHandler(function() {
        setStatus('success', 'Готово! Данные вставлены в лист Tech.')
        document.getElementById('runBtn').disabled = false
      })
      .withFailureHandler(function(err) {
        showError(err)
        document.getElementById('runBtn').disabled = false
      })
      .translateAndFill(fileBase64, fileMime)
  }

  function setStatus(type, html) {
    var box = document.getElementById('statusBox')
    box.className = 'status-box ' + type
    box.innerHTML = html
  }

  function showError(err) {
    setStatus('error', err.message || String(err))
  }
</script>

</body>
</html>
